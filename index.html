<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gehaltsrechner Pro</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; padding:20px;}
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input,select{ width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc;}
button{ padding:10px 15px; margin-top:15px; cursor:pointer; border:none; border-radius:6px; }
.primary{ background:#0078d4; color:#fff;}
.result{ margin-top:20px; display:none; background:#f1f5f9; padding:15px; border-radius:8px;}
</style>

</head>
<body>

<div class="container">
<h2>Gehaltsrechner (inkl. Netto, Steuerklasse, Kinder, Kirchensteuer)</h2>

<label>Brutto (€)</label>
<input id="brutto" type="number">

<label>Wochenstunden (aktuell)</label>
<input id="alt" type="number">

<label>Wochenstunden (neu)</label>
<input id="neu" type="number">

<label>Steuerklasse</label>
<select id="klasse">
<option>1</option><option>2</option><option>3</option>
<option selected>4</option>
<option>5</option><option>6</option>
</select>

<label>Kinderfreibeträge</label>
<input id="kinder" type="number" step="0.5" value="0">

<label>Kirchensteuer</label>
<select id="kirche">
<option value="0">Nein</option>
<option value="1">Ja (9%)</option>
</select>

<label>KV Zusatz (%)</label>
<input id="kv" type="number" value="1.3">

<button class="primary" onclick="calc()">Berechnen</button>

<div class="result" id="out"></div>

</div>

<script>

const GRUND = 12348;
const KIND = 4878;

function euro(x){
 return x.toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}

function tax(zve){
 if(zve<=0) return 0;
 return zve * 0.25; // bewusst einfache Näherung
}

function sozial(brutto, kinder, kv){
 let pv = kinder>0 ? 0.018 : 0.024;
 let kvs = 0.073 + (kv/100/2);
 return brutto * (0.093 + 0.013 + pv + kvs);
}

function calc(){

 let brutto = +document.getElementById("brutto").value;
 let alt = +document.getElementById("alt").value;
 let neu = +document.getElementById("neu").value;
 let klasse = +document.getElementById("klasse").value;
 let kinder = +document.getElementById("kinder").value;
 let kirche = +document.getElementById("kirche").value;
 let kv = +document.getElementById("kv").value;

 let stunden = brutto/(alt*4.33);
 let neuBrutto = stunden*neu*4.33;

 let fb = 0;

 if(klasse==1||klasse==4) fb=GRUND;
 if(klasse==2) fb=GRUND+4260;
 if(klasse==3) fb=GRUND*2;
 if(klasse>=5) fb=0;

 fb += kinder*KIND;

 let zve1 = brutto*12 - fb;
 let zve2 = neuBrutto*12 - fb;

 let st1 = tax(zve1)/12;
 let st2 = tax(zve2)/12;

 // Kirchensteuer
 if(kirche==1){
   st1 += st1*0.09;
   st2 += st2*0.09;
 }

 let sv1 = sozial(brutto,kinder,kv);
 let sv2 = sozial(neuBrutto,kinder,kv);

 let net1 = brutto - st1 - sv1;
 let net2 = neuBrutto - st2 - sv2;

 document.getElementById("out").style.display="block";
 document.getElementById("out").innerHTML =
 "<b>Neues Brutto:</b> "+euro(neuBrutto)+"<br>"+
 "<b>Netto alt:</b> "+euro(net1)+"<br>"+
 "<b>Netto neu:</b> "+euro(net2)+"<br>"+
 "<b>Differenz:</b> "+euro(net2-net1);

}

</script>
</body>
</html>
